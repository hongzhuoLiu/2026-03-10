<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudentsChoice Email Preview</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        padding: 20px;
      }

      .preview-container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .controls {
        background: white;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 30px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .controls h1 {
        margin-bottom: 20px;
        color: #333;
      }

      .control-group {
        margin-bottom: 15px;
      }

      .control-group label {
        display: inline-block;
        margin-right: 15px;
        font-weight: bold;
        color: #666;
      }

      select,
      button {
        padding: 10px 20px;
        font-size: 14px;
        border-radius: 6px;
        border: 1px solid #ccc;
        cursor: pointer;
        font-family: Arial, sans-serif;
      }

      button {
        background-color: #6b1f3b;
        color: white;
        border: none;
        font-weight: bold;
        margin-left: 10px;
      }

      button:hover {
        background-color: #8b2f4b;
      }

      .email-container {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .email-container.light-mode {
        background-color: #ffffff;
        color: #000000;
        border: 2px solid #000000;
      }

      .email-container.dark-mode {
        background-color: #1a1a1a;
        color: #ffffff;
        border: 2px solid #ffffff;
      }

      .email-header {
        background-color: #6b1f3b;
        padding: 0;
        text-align: center;
        overflow: hidden;
      }

      .email-header img {
        width: 100%;
        height: auto;
        display: block;
      }

      .email-body {
        padding: 30px 40px;
      }

      .email-greeting {
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .email-content {
        font-size: 12px;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .email-content p {
        margin: 10px 0;
      }

      .notification-list {
        margin: 15px 0;
        padding-left: 20px;
      }

      .notification-list li {
        font-size: 12px;
        margin: 8px 0;
        line-height: 1.5;
      }

      .verification-code {
        background-color: #f0f0f0;
        color: #000000;
        padding: 15px 30px;
        font-size: 24px;
        font-weight: bold;
        letter-spacing: 8px;
        text-align: center;
        border-radius: 8px;
        margin: 20px 0;
      }

      .email-button {
        display: inline-block;
        background-color: #6b1f3b;
        color: #ffffff !important;
        font-size: 18px;
        font-weight: bold;
        padding: 12px 40px;
        text-decoration: none;
        border-radius: 8px;
        text-align: center;
        margin: 20px 0;
        transition: background-color 0.3s ease, transform 0.2s ease;
        cursor: pointer;
        border: 2px solid #6b1f3b;
      }

      .email-button:hover {
        background-color: #8b2f4b;
        border-color: #8b2f4b;
        transform: translateY(-2px);
      }

      .dark-mode .email-button {
        border: 2px solid #ffffff;
      }

      .button-container {
        text-align: center;
        margin: 30px 0;
      }

      .email-footer {
        font-size: 12px;
        line-height: 1.6;
        padding: 30px 40px;
        border-top: 1px solid #e0e0e0;
      }

      .dark-mode .email-footer {
        border-top: 1px solid #3a3a3a;
      }

      .email-footer p {
        margin: 8px 0;
      }

      .email-footer a {
        color: #6b1f3b;
        text-decoration: none;
        word-break: break-all;
      }

      .dark-mode .email-footer a {
        color: #ff8fa3;
      }

      .email-license {
        font-size: 9px;
        color: #666666;
        line-height: 1.6;
        margin-top: 0;
        text-align: center;
        max-width: 100%;
      }

      .dark-mode .email-license {
        color: #999999;
      }

      .info-panel {
        background: white;
        padding: 20px;
        border-radius: 12px;
        margin-top: 30px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .info-panel h3 {
        margin-bottom: 15px;
        color: #333;
      }

      .info-panel ul {
        padding-left: 20px;
      }

      .info-panel li {
        margin: 8px 0;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="preview-container">
      <!-- Control Panel -->
      <div class="controls">
        <h1>📧 StudentsChoice Email Template Preview</h1>

        <div class="control-group">
          <label>Select Email Template:</label>
          <select id="templateSelector">
            <option value="notification">Notification Email</option>
            <option value="special">Special Message Email</option>
            <option value="reset">Reset Password Email</option>
          </select>
        </div>

        <div class="control-group">
          <label>Theme Mode:</label>
          <button id="themeToggle" onclick="toggleTheme()">
            Switch to Dark Mode
          </button>
        </div>
      </div>

      <!-- Email Preview Area -->
      <div id="emailPreview"></div>

      <!-- Info Panel -->
      <div class="info-panel">
        <h3>📋 Design Specifications</h3>
        <ul>
          <li><strong>Font:</strong> Arial (system default)</li>
          <li><strong>Body Text:</strong> 12px</li>
          <li><strong>Button Text:</strong> 18px, Bold</li>
          <li><strong>Heading/Greeting:</strong> 12px, Bold</li>
          <li>
            <strong>Button Link:</strong>
            https://frontend-dev.studentschoice.blog/
          </li>
          <li><strong>Features:</strong> Light/Dark mode, Responsive design</li>
        </ul>
      </div>
    </div>

    <script>
      let isDarkMode = false;

      // Email template data
      const templates = {
        notification: {
          title: "Notification Email",
          html: `
          <div class="email-container light-mode" id="emailContainer">
            <div class="email-header">
              <img src="src/images/logos/EmailBanner.png" alt="Students Choice">
            </div>
            <div class="email-body">
              <div class="email-greeting">Hi John,</div>
              <div class="email-content">
                <p>Here's what happened on StudentsChoice since your last visit:</p>
                <div style="margin-top: 20px;">
                  <strong>Notifications</strong>
                  <ul class="notification-list">
                    <li>(5) new comments on your post.</li>
                    <li>(12) like on your comment.</li>
                  </ul>
                </div>
              </div>
              <div class="button-container">
                <a href="https://frontend-dev.studentschoice.blog/" class="email-button" target="_blank">
                  View Notifications
                </a>
              </div>
              <div class="email-content">
                <p>This message was sent by StudentsChoice Team.</p>
                <p>To manage your email preferences, visit your user profile on Students Choice</p>
              </div>
            </div>
            <div class="email-footer">
              <div class="email-license">
                The contents of this email are confidential and for the intended recipient only.<br>
                If you have received this email in error, please delete it.<br>
                Our liability for information contained in this email is limited in accordance with<br>
                our commercial agreements with you, and the terms and conditions on our<br>
                website: <a href="https://frontend-dev.studentschoice.blog/" target="_blank">https://frontend-dev.studentschoice.blog/</a><br>
                We'll never email you about a change to our bank account details. If you receive<br>
                an email requesting payment into a different Students Choice bank account,<br>
                please don't make any payments before contacting us at [email address]
              </div>
            </div>
          </div>
        `,
        },
        special: {
          title: "Special Message Email",
          html: `
          <div class="email-container light-mode" id="emailContainer">
            <div class="email-header">
              <img src="src/images/logos/EmailBanner.png" alt="Students Choice">
            </div>
            <div class="email-body">
              <div class="email-greeting">Hi John,</div>
              <div class="email-content">
                <p>We've got an update for you!</p>
                <p style="margin-top: 20px;">{{message_body}}</p>
              </div>
              <div class="button-container">
                <a href="https://frontend-dev.studentschoice.blog/" class="email-button" target="_blank">
                  View Notification
                </a>
              </div>
              <div class="email-content">
                <p>This message was sent by StudentsChoice Team.</p>
                <p>To manage your email preferences, visit your user profile on Students Choice</p>
              </div>
            </div>
            <div class="email-footer">
              <div class="email-license">
                The contents of this email are confidential and for the intended recipient only.<br>
                If you have received this email in error, please delete it.<br>
                Our liability for information contained in this email is limited in accordance with<br>
                our commercial agreements with you, and the terms and conditions on our<br>
                website: <a href="https://frontend-dev.studentschoice.blog/" target="_blank">https://frontend-dev.studentschoice.blog/</a><br>
                We'll never email you about a change to our bank account details. If you receive<br>
                an email requesting payment into a different Students Choice bank account,<br>
                please don't make any payments before contacting us at [email address]
              </div>
            </div>
          </div>
        `,
        },
        reset: {
          title: "Reset Password Email",
          html: `
          <div class="email-container light-mode" id="emailContainer">
            <div class="email-header">
              <img src="src/images/logos/EmailBanner.png" alt="Students Choice">
            </div>
            <div class="email-body">
              <div class="email-greeting">Hi John,</div>
              <div class="email-content">
                <p>We received a request to reset your StudentsChoice password.</p>
                <p style="margin-top: 20px;">Your verification code is:</p>
              </div>
              <div class="verification-code">504631</div>
              <div class="email-content">
                <p>If you didn't request this, you can safely ignore this email.</p>
                <p>Please enter this code in the password reset page within {{expiry_time}} for your security.</p>
              </div>
              <div class="button-container">
                <a href="https://frontend-dev.studentschoice.blog/" class="email-button" target="_blank">
                  View Notification
                </a>
              </div>
              <div class="email-content">
                <p>This message was sent by StudentsChoice Team.</p>
                <p>To manage your email preferences, visit your user profile on Students Choice</p>
              </div>
            </div>
            <div class="email-footer">
              <div class="email-license">
                The contents of this email are confidential and for the intended recipient only.<br>
                If you have received this email in error, please delete it.<br>
                Our liability for information contained in this email is limited in accordance with<br>
                our commercial agreements with you, and the terms and conditions on our<br>
                website: <a href="https://frontend-dev.studentschoice.blog/" target="_blank">https://frontend-dev.studentschoice.blog/</a><br>
                We'll never email you about a change to our bank account details. If you receive<br>
                an email requesting payment into a different Students Choice bank account,<br>
                please don't make any payments before contacting us at [email address]
              </div>
            </div>
          </div>
        `,
        },
      };

      // Toggle theme
      function toggleTheme() {
        isDarkMode = !isDarkMode;
        const container = document.getElementById("emailContainer");
        const button = document.getElementById("themeToggle");

        if (isDarkMode) {
          container.classList.remove("light-mode");
          container.classList.add("dark-mode");
          button.textContent = "Switch to Light Mode";
          document.body.style.backgroundColor = "#0a0a0a";
        } else {
          container.classList.remove("dark-mode");
          container.classList.add("light-mode");
          button.textContent = "Switch to Dark Mode";
          document.body.style.backgroundColor = "#f5f5f5";
        }
      }

      // Switch template
      function switchTemplate() {
        const selector = document.getElementById("templateSelector");
        const preview = document.getElementById("emailPreview");
        const selectedTemplate = templates[selector.value];

        preview.innerHTML = selectedTemplate.html;

        // Restore current theme
        if (isDarkMode) {
          const container = document.getElementById("emailContainer");
          container.classList.remove("light-mode");
          container.classList.add("dark-mode");
        }
      }

      // Initialize
      document
        .getElementById("templateSelector")
        .addEventListener("change", switchTemplate);
      switchTemplate();
    </script>
  </body>
</html>
